name: 'direct'
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
on:
  workflow_dispatch:
    inputs:
      file_url:
        required: true
        type: string
      folder_name:
        required: true
        type: string
permissions:
  contents: write
jobs:
  x:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1
      
      - name: setup
        run: |
          set +x
          echo "::add-mask::${{ github.event.inputs.file_url }}"
          echo "::add-mask::${{ github.event.inputs.folder_name }}"
          
          {
            sudo apt-get update -qq
            sudo apt-get install -y -qq aria2 pigz
            
            git config user.name "x"
            git config user.email "x@x.x"
            git config http.postBuffer 1048576000
            git config http.version HTTP/1.1
            git config core.compression 0
          } > /dev/null 2>&1
          
      - name: download
        run: |
          set +x
          U="${{ github.event.inputs.file_url }}"
          F="${{ github.event.inputs.folder_name }}"
          
          RN=$(basename "${U%%\?*}" | sed 's/%20/ /g')
          FN="${RN}"
          
          {
            aria2c \
              --max-tries=10 \
              --retry-wait=3 \
              --max-connection-per-server=16 \
              --split=16 \
              --min-split-size=1M \
              --connect-timeout=60 \
              --timeout=120 \
              --file-allocation=none \
              --allow-overwrite=true \
              --console-log-level=error \
              --summary-interval=0 \
              --disable-ipv6=true \
              --continue=true \
              -o "t" "$U"
          } > /dev/null 2>&1
          
          if [ ! -f "t" ] || [ ! -s "t" ]; then
            exit 1
          fi
          
          echo "FNAME=${FN}" >> $GITHUB_ENV
          echo "FOLD=${F}" >> $GITHUB_ENV
          
      - name: process
        run: |
          set +x
          FOLD="${{ env.FOLD }}"
          
          {
            zip -0 -q "${FOLD}.z" "t"
            rm -f t
            mkdir -p "d/${FOLD}"
            split -b 49M -d -a 3 "${FOLD}.z" "d/${FOLD}/c_"
          } > /dev/null 2>&1
          
          if [ ! -f "d/${FOLD}/c_000" ]; then
            exit 1
          fi
          
          a=1
          for i in d/${FOLD}/c_*; do
            [ -f "$i" ] && mv "$i" "d/${FOLD}/${FOLD}.z.$(printf '%03d' $a)" > /dev/null 2>&1
            a=$((a+1))
          done
          
          total_parts=$((a-1))
          echo "TPARTS=${total_parts}" >> $GITHUB_ENV
          
          rm -f "${FOLD}.z" > /dev/null 2>&1
          
      - name: push
        run: |
          set +x
          
          {
            git add -A d/
            git diff --cached --quiet || git commit -m "p ${{ env.FOLD }} ${{ env.TPARTS }}" --quiet
          } > /dev/null 2>&1
          
          retry=0
          until [ $retry -ge 5 ]; do
            git push origin main --quiet --no-progress > /dev/null 2>&1 && exit 0
            retry=$((retry+1))
            [ $retry -lt 5 ] && {
              git pull --rebase origin main --quiet > /dev/null 2>&1
              sleep $((retry * 2))
            }
          done
          
          exit 1
          
      - name: cleanup
        if: always()
        run: |
          rm -rf t *.z d/ 2>/dev/null || true
