name: 'GT'
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
on:
  workflow_dispatch:
    inputs:
      file_url:
        required: true
        type: string
      folder_name:
        required: true
        type: string
permissions:
  contents: write
jobs:
  x:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      
      - name: setup
        run: |
          exec 2>/dev/null
          set +x
          
          # Mask sensitive inputs
          echo "::add-mask::${{ github.event.inputs.file_url }}"
          echo "::add-mask::${{ github.event.inputs.folder_name }}"
          
          # Install dependencies silently with retry
          for i in {1..3}; do
            if sudo DEBIAN_FRONTEND=noninteractive apt-get update -qq && \
               sudo DEBIAN_FRONTEND=noninteractive apt-get install -y -qq aria2 pigz pv 2>&1 | grep -v .; then
              break
            fi
            sleep 2
          done
          
          # Configure git
          git config --global user.name "x" 2>&1 | grep -v .
          git config --global user.email "x@x.x" 2>&1 | grep -v .
          git config --global http.postBuffer 1048576000 2>&1 | grep -v .
          git config --global http.version HTTP/1.1 2>&1 | grep -v .
          git config --global core.compression 0 2>&1 | grep -v .
          git config --global pack.windowMemory 100m 2>&1 | grep -v .
          git config --global pack.threads 1 2>&1 | grep -v .
          
      - name: download
        run: |
          exec 1>/dev/null 2>/dev/null
          set +x
          
          u="${{ github.event.inputs.file_url }}"
          f="${{ github.event.inputs.folder_name }}"
          
          # Extract filename
          rn=$(basename "${u%%\?*}" | sed 's/%20/ /g' | head -c 255)
          fn="${rn%.*}.${rn##*.}"
          
          # Download with retry and resume capability
          retry=0
          max_retry=5
          until [ $retry -ge $max_retry ]; do
            if aria2c \
              --max-tries=10 \
              --retry-wait=3 \
              --max-file-not-found=3 \
              --max-connection-per-server=16 \
              --split=16 \
              --min-split-size=1M \
              --connect-timeout=30 \
              --timeout=60 \
              --file-allocation=none \
              --allow-overwrite=true \
              --auto-file-renaming=false \
              --conditional-get=true \
              --remote-time=true \
              --console-log-level=error \
              --summary-interval=0 \
              --download-result=hide \
              --disable-ipv6=true \
              --quiet=true \
              -o "t" "$u" 2>&1 | grep -v .; then
              break
            fi
            retry=$((retry+1))
            sleep 5
          done
          
          if [ ! -f "t" ] || [ ! -s "t" ]; then
            exit 1
          fi
          
          # Save to environment
          {
            echo "FNAME<<EOF"
            echo "$fn"
            echo "EOF"
            echo "FOLD<<EOF"
            echo "$f"
            echo "EOF"
          } >> $GITHUB_ENV
          
      - name: process
        run: |
          exec 1>/dev/null 2>/dev/null
          set +x
          
          # Use store compression (faster) and parallel compression
          if command -v pigz &> /dev/null; then
            zip -0 -q "${{ env.FOLD }}.z" "t" 2>&1 | grep -v .
          else
            zip -0 -q "${{ env.FOLD }}.z" "t" 2>&1 | grep -v .
          fi
          
          # Verify zip creation
          if [ ! -f "${{ env.FOLD }}.z" ] || [ ! -s "${{ env.FOLD }}.z" ]; then
            exit 1
          fi
          
          rm -f t
          
          # Create directory structure
          mkdir -p "d/${{ env.FOLD }}"
          
          # Split file into 49MB chunks with better error handling
          split -b 49M -d -a 3 "${{ env.FOLD }}.z" "d/${{ env.FOLD }}/c_" 2>&1 | grep -v .
          
          # Rename parts
          a=1
          for i in d/${{ env.FOLD }}/c_*; do
            if [ -f "$i" ]; then
              mv "$i" "$(printf "d/${{ env.FOLD }}/${{ env.FOLD }}.z.%03d" "$a")" 2>&1 | grep -v .
              a=$((a+1))
            fi
          done
          
          total_parts=$((a-1))
          
          # Verify parts were created
          if [ $total_parts -eq 0 ]; then
            exit 1
          fi
          
          echo "TPARTS=$total_parts" >> $GITHUB_ENV
          rm -f "${{ env.FOLD }}.z"
          
      - name: push
        run: |
          exec 1>/dev/null 2>/dev/null
          set +x
          
          # Stage files
          git add -A d/ 2>&1 | grep -v .
          
          # Create commit
          git commit -m "p ${{ env.FOLD }} ${{ env.TPARTS }}" --quiet 2>&1 | grep -v .
          
          # Push with retry mechanism
          retry=0
          max_retry=5
          until [ $retry -ge $max_retry ]; do
            if git push origin main --quiet --no-progress 2>&1 | grep -v .; then
              exit 0
            fi
            retry=$((retry+1))
            
            # Pull and rebase if needed
            if [ $retry -lt $max_retry ]; then
              git pull --rebase origin main --quiet 2>&1 | grep -v .
              sleep $((retry * 2))
            fi
          done
          
          exit 1
          
      - name: cleanup
        if: always()
        run: |
          exec 1>/dev/null 2>/dev/null
          set +x
          rm -rf t "${{ env.FOLD }}.z" d/ 2>&1 | grep -v .
